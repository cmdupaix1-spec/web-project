<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modern Snake</title>
    <style>
        body {
            background-color: #1a1a2e;
            color: #ffffff;
            font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
        }

        h1 {
            margin-bottom: 5px;
            color: #0f3460;
            text-shadow: 1px 1px 2px #e94560;
        }

        .score-board {
            display: flex;
            gap: 30px;
            margin-bottom: 20px;
            font-size: 1.2rem;
            font-weight: bold;
        }

        .score-board span {
            color: #e94560;
        }

        .game-container {
            position: relative;
        }

        canvas {
            background-color: #16213e;
            border: 4px solid #0f3460;
            border-radius: 8px;
            box-shadow: 0 0 20px rgba(233, 69, 96, 0.2);
        }

        .overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(26, 26, 46, 0.85);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border-radius: 8px;
            z-index: 10;
        }

        .hidden {
            display: none !important;
        }

        button {
            background-color: #e94560;
            color: white;
            border: none;
            padding: 10px 20px;
            font-size: 1.1rem;
            border-radius: 5px;
            cursor: pointer;
            transition: background-color 0.2s;
            margin-top: 15px;
        }

        button:hover {
            background-color: #c8324a;
        }

        .controls {
            margin-top: 15px;
            text-align: center;
            font-size: 0.9rem;
            color: #a1a1aa;
        }

        .controls kbd {
            background: #333;
            padding: 2px 6px;
            border-radius: 4px;
            color: white;
        }
    </style>
</head>
<body>
    <div style="position: absolute; top: 20px; right: 24px; display: flex; gap: 14px; flex-wrap: wrap; font-weight: 700;">
        <a href="index.html" style="color: #ffffff; text-decoration: none;">Home</a>
        <a href="resume.html" style="color: #ffffff; text-decoration: none;">Resume</a>
        <a href="../scratch.html" style="color: #ffffff; text-decoration: none;">My work</a>
        <a href="app.html" style="color: #ffffff; text-decoration: none;">App</a>
        <a href="contact.html" style="color: #ffffff; text-decoration: none;">Tableau</a>
    </div>

    <h1>NEON SNAKE</h1>
    <div class="score-board">
        <div>Score: <span id="currentScore">0</span></div>
        <div>High Score: <span id="highScore">0</span></div>
    </div>

    <div class="game-container">
        <canvas id="gameCanvas" width="400" height="400"></canvas>

        <div id="startOverlay" class="overlay">
            <h2>Ready to play?</h2>
            <button onclick="startGame()">Start Game</button>
        </div>

        <div id="pauseOverlay" class="overlay hidden">
            <h2>PAUSED</h2>
            <p>Press Space to Resume</p>
        </div>

        <div id="gameOverOverlay" class="overlay hidden">
            <h2>GAME OVER</h2>
            <p>Final Score: <span id="finalScoreDisplay">0</span></p>
            <button onclick="resetGame()">Play Again</button>
        </div>
    </div>

    <div class="controls">
        <p>Use <kbd>↑</kbd> <kbd>↓</kbd> <kbd>←</kbd> <kbd>→</kbd> to move. Press <kbd>Space</kbd> to pause.</p>
    </div>

    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");
        const boxSize = 20;

        let snake, food, direction, score, gameLoop, speed, isPaused, gameActive;
        let highScore = localStorage.getItem("snakeHighScore") || 0;
        document.getElementById("highScore").innerText = highScore;

        function initVars() {
            snake = [{ x: 200, y: 200 }];
            score = 0;
            direction = "RIGHT";
            speed = 120;
            isPaused = false;
            gameActive = false;
            document.getElementById("currentScore").innerText = score;
            spawnFood();
        }

        function spawnFood() {
            food = {
                x: Math.floor(Math.random() * (canvas.width / boxSize)) * boxSize,
                y: Math.floor(Math.random() * (canvas.height / boxSize)) * boxSize
            };

            for (let part of snake) {
                if (part.x === food.x && part.y === food.y) {
                    spawnFood();
                    return;
                }
            }
        }

        document.addEventListener("keydown", (e) => {
            if (!gameActive) return;

            if (e.code === "Space") {
                e.preventDefault();
                togglePause();
                return;
            }

            if (isPaused) return;

            if (e.key === "ArrowUp" && direction !== "DOWN") direction = "UP";
            else if (e.key === "ArrowDown" && direction !== "UP") direction = "DOWN";
            else if (e.key === "ArrowLeft" && direction !== "RIGHT") direction = "LEFT";
            else if (e.key === "ArrowRight" && direction !== "LEFT") direction = "RIGHT";
        });

        function drawGame() {
            if (isPaused) return;

            let headX = snake[0].x;
            let headY = snake[0].y;

            if (direction === "UP") headY -= boxSize;
            if (direction === "DOWN") headY += boxSize;
            if (direction === "LEFT") headX -= boxSize;
            if (direction === "RIGHT") headX += boxSize;

            if (headX < 0 || headX >= canvas.width || headY < 0 || headY >= canvas.height || collision(headX, headY, snake)) {
                return gameOver();
            }

            let newHead = { x: headX, y: headY };
            snake.unshift(newHead);

            if (headX === food.x && headY === food.y) {
                score += 10;
                document.getElementById("currentScore").innerText = score;
                spawnFood();

                if (speed > 50) {
                    speed -= 2;
                    clearInterval(gameLoop);
                    gameLoop = setInterval(drawGame, speed);
                }
            } else {
                snake.pop();
            }

            ctx.fillStyle = "#16213e";
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            ctx.fillStyle = "#e94560";
            ctx.shadowBlur = 10;
            ctx.shadowColor = "#e94560";
            ctx.beginPath();
            ctx.arc(food.x + boxSize / 2, food.y + boxSize / 2, boxSize / 2 - 2, 0, Math.PI * 2);
            ctx.fill();
            ctx.shadowBlur = 0;

            for (let i = 0; i < snake.length; i++) {
                ctx.fillStyle = i === 0 ? "#4ecca3" : "#389c7b";
                ctx.fillRect(snake[i].x, snake[i].y, boxSize, boxSize);
                ctx.strokeStyle = "#16213e";
                ctx.strokeRect(snake[i].x, snake[i].y, boxSize, boxSize);
            }
        }

        function collision(x, y, array) {
            for (let i = 0; i < array.length; i++) {
                if (x === array[i].x && y === array[i].y) return true;
            }
            return false;
        }

        function startGame() {
            initVars();
            gameActive = true;
            document.getElementById("startOverlay").classList.add("hidden");
            document.getElementById("pauseOverlay").classList.add("hidden");
            document.getElementById("gameOverOverlay").classList.add("hidden");
            clearInterval(gameLoop);
            gameLoop = setInterval(drawGame, speed);
        }

        function togglePause() {
            isPaused = !isPaused;
            const pauseOverlay = document.getElementById("pauseOverlay");
            if (isPaused) {
                pauseOverlay.classList.remove("hidden");
            } else {
                pauseOverlay.classList.add("hidden");
            }
        }

        function gameOver() {
            gameActive = false;
            clearInterval(gameLoop);
            document.getElementById("gameOverOverlay").classList.remove("hidden");
            document.getElementById("finalScoreDisplay").innerText = score;

            if (score > highScore) {
                highScore = score;
                localStorage.setItem("snakeHighScore", highScore);
                document.getElementById("highScore").innerText = highScore;
            }
        }

        function resetGame() {
            document.getElementById("gameOverOverlay").classList.add("hidden");
            startGame();
        }
    </script>
</body>
</html>
